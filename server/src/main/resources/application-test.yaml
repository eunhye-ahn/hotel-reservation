spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  config:
    import: optional:file:.env[.properties]
  h2:
    console:
      enabled: true  # h2 콘솔 접속 가능
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # 시작시 생성, 종료시 삭제
  sql:
    init:
      encoding: UTF-8
      mode: always  # data.sql 실행
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reservation-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.hotel.reservation.dto.PaymentCompletedMessage
        spring.json.use.type.headers: false
jwt:
  secret: testSecretKeyForTestingPurposeOnly1234567890
  access-expiration: 1800000
  refresh-expiration: 86400000



