spring:
  profiles:
    active: prod
  application:
    name: reservation
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_reserve
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 86400000