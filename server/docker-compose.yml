services:

  #호텔예약서비스
  reservation-service:
    build:
      context: ./reservation-server
    container_name: reservation-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://reservation-postgresql:5432/hotel_reserve
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}

      PAYMENT_SERVICE_URL: http://payment-service:8081
    depends_on:
      - reservation-postgresql
      - redis
      - kafka
    networks:
      - server-network

  #결제서비스
  payment-service:
    build:
      context: ./payment-server
    container_name: payment-server
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-postgresql:5432/payment_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      SPRING_REDIS_HOST: redis

    depends_on:
      - payment-postgresql
      - kafka
      - redis
    networks:
      - server-network


  # 예약 DB
  reservation-postgresql:
    image: postgres:17
    container_name: reservation-postgresql
    environment:
      POSTGRES_DB: hotel_reserve
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - reservation-postgresql-data:/var/lib/postgresql/data
    networks:
      - server-network

  # 결제 DB
  payment-postgresql:
    image: postgres:17
    container_name: payment-postgresql
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - payment-postgresql-data:/var/lib/postgresql/data
    networks:
      - server-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk  #고정클러스터ID (임의의 값)
    networks:
      - server-network


  redis:
    image: redis:7.4
    container_name: reservation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - server-network

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: hotel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    command: >
      bash -c "
      bin/elasticsearch-plugin install analysis-nori --batch &&
      bin/elasticsearch"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - server-network

  kibana:
    image: kibana:8.19.0
    container_name: jncard-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - server-network

volumes:
  reservation-postgresql-data:
  redis-data:
  payment-postgresql-data:
  es-data:

## 서비스가 확장되면 API 게이트웨이 추가 예정
networks:
  server-network:
