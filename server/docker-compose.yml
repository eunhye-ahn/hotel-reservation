services:
  postgresql:
    image: postgres:17
    container_name: hotelreserve-postgres
    environment:
      POSTGRES_DB: hotel_reserve
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hotelreserve-network

  redis:
    image: redis:7.4
    container_name: hotelreserve-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hotelreserve-network

volumes:
  postgres-data:
  redis-data:

networks:
  hotelreserve-network:
