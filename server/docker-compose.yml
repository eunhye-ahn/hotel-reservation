services:

  hotel-postgresql:
    image: postgres:17
    container_name: hotel-postgresql
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hotel-postgresql-data:/var/lib/postgresql/data
    networks:
      - server-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk  #고정클러스터ID (임의의 값)
    networks:
      - server-network


  redis:
    image: redis:7.4
    container_name: hotel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - server-network

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: hotel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    command: >
      bash -c "
      bin/elasticsearch-plugin install analysis-nori --batch &&
      bin/elasticsearch"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - server-network

  kibana:
    image: kibana:8.19.0
    container_name: hotel-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - server-network

volumes:
  hotel-postgresql-data:
  redis-data:
  es-data:

networks:
  server-network:
